<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobrinha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Jogo da Cobrinha</h1>
            <div class="score-container">
                <span>Pontuação: </span>
                <span id="score">0</span>
            </div>
        </div>
        <canvas id="game" width="400" height="400"></canvas>
        <div class="game-controls">
            <button id="start-btn">Iniciar Jogo</button>
            <button id="records-btn">Recordes</button>
        </div>
    </div>
    
    <div id="records-modal" class="modal">
        <div class="modal-content">
            <h2>Recordes</h2>
            <ul id="records-list"></ul>
            <button id="close-records-btn">Fechar</button>
        </div>
    </div>
    
    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h2>Novo Recorde!</h2>
            <p>Sua pontuação: <span id="final-score">0</span></p>
            <input type="text" id="player-name" placeholder="Digite seu nome" maxlength="15">
            <button id="save-name-btn">Salvar</button>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
